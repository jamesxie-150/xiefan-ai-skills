<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>扫雷</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.container { text-align: center; }
h1 { font-size: 2rem; margin-bottom: 12px; color: #e94560; }
.controls { margin-bottom: 16px; display: flex; gap: 12px; justify-content: center; align-items: center; flex-wrap: wrap; }
.controls label { font-size: 14px; }
.controls select, .controls button { padding: 6px 14px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
.controls select { background: #16213e; color: #eee; }
.controls button { background: #e94560; color: #fff; font-weight: bold; }
.controls button:hover { background: #c73650; }
.info { margin-bottom: 12px; font-size: 16px; display: flex; gap: 24px; justify-content: center; }
.info span { background: #16213e; padding: 4px 14px; border-radius: 6px; }
#board { display: inline-grid; gap: 2px; user-select: none; }
.cell {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: background .1s;
}
.cell.hidden { background: #0f3460; }
.cell.hidden:hover { background: #1a4a7a; }
.cell.revealed { background: #16213e; cursor: default; }
.cell.mine-hit { background: #e94560; }
.cell.flagged::after { content: '🚩'; }
.cell.revealed.mine::after { content: '💣'; }
.n1 { color: #4fc3f7; } .n2 { color: #81c784; } .n3 { color: #e57373; }
.n4 { color: #9575cd; } .n5 { color: #ff8a65; } .n6 { color: #4dd0e1; }
.n7 { color: #f06292; } .n8 { color: #aaa; }
#msg { margin-top: 16px; font-size: 1.4rem; min-height: 36px; }
.win { color: #81c784; } .lose { color: #e94560; }
</style>
</head>
<body>
<div class="container">
  <h1>💣 扫雷</h1>
  <div class="controls">
    <label>难度：</label>
    <select id="diff">
      <option value="easy">初级 (9×9, 10雷)</option>
      <option value="medium" selected>中级 (16×16, 40雷)</option>
      <option value="hard">高级 (30×16, 99雷)</option>
    </select>
    <button onclick="newGame()">新游戏</button>
  </div>
  <div class="info">
    <span>💣 剩余：<b id="mineCount">0</b></span>
    <span>⏱ 时间：<b id="timer">0</b>s</span>
  </div>
  <div id="board"></div>
  <div id="msg"></div>
</div>
<script>
const PRESETS = {
  easy:   { rows: 9,  cols: 9,  mines: 10 },
  medium: { rows: 16, cols: 16, mines: 40 },
  hard:   { rows: 16, cols: 30, mines: 99 },
};

let rows, cols, totalMines, board, revealed, flagged, mineSet, gameOver, firstClick, flagCount, timerId, seconds;

function newGame() {
  const p = PRESETS[document.getElementById('diff').value];
  rows = p.rows; cols = p.cols; totalMines = p.mines;
  board = Array.from({ length: rows }, () => Array(cols).fill(0));
  revealed = Array.from({ length: rows }, () => Array(cols).fill(false));
  flagged = Array.from({ length: rows }, () => Array(cols).fill(false));
  mineSet = new Set(); gameOver = false; firstClick = true; flagCount = 0; seconds = 0;
  clearInterval(timerId); timerId = null;
  document.getElementById('timer').textContent = '0';
  document.getElementById('mineCount').textContent = totalMines;
  document.getElementById('msg').textContent = '';
  render();
}

function placeMines(safeR, safeC) {
  const safe = new Set();
  for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) safe.add(`${safeR+dr},${safeC+dc}`);
  while (mineSet.size < totalMines) {
    const r = Math.floor(Math.random() * rows), c = Math.floor(Math.random() * cols);
    const key = `${r},${c}`;
    if (!safe.has(key) && !mineSet.has(key)) { mineSet.add(key); board[r][c] = -1; }
  }
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    if (board[r][c] === -1) continue;
    let cnt = 0;
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      const nr = r+dr, nc = c+dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1) cnt++;
    }
    board[r][c] = cnt;
  }
}

function reveal(r, c) {
  if (r < 0 || r >= rows || c < 0 || c >= cols || revealed[r][c] || flagged[r][c]) return;
  revealed[r][c] = true;
  if (board[r][c] === 0) {
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      if (dr || dc) reveal(r+dr, c+dc);
    }
  }
}

function checkWin() {
  let cnt = 0;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) if (revealed[r][c]) cnt++;
  return cnt === rows * cols - totalMines;
}

function handleClick(r, c) {
  if (gameOver || flagged[r][c] || revealed[r][c]) return;
  if (firstClick) { placeMines(r, c); firstClick = false; timerId = setInterval(() => { seconds++; document.getElementById('timer').textContent = seconds; }, 1000); }
  if (board[r][c] === -1) {
    gameOver = true; clearInterval(timerId);
    revealed[r][c] = true;
    mineSet.forEach(k => { const [mr,mc] = k.split(',').map(Number); revealed[mr][mc] = true; });
    render(); highlightHit(r, c);
    document.getElementById('msg').innerHTML = '<span class="lose">💥 踩雷了！游戏结束</span>';
    return;
  }
  reveal(r, c);
  if (checkWin()) {
    gameOver = true; clearInterval(timerId);
    document.getElementById('msg').innerHTML = '<span class="win">🎉 恭喜通关！</span>';
  }
  render();
}

function handleRightClick(e, r, c) {
  e.preventDefault();
  if (gameOver || revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  flagCount += flagged[r][c] ? 1 : -1;
  document.getElementById('mineCount').textContent = totalMines - flagCount;
  render();
}

function handleDblClick(r, c) {
  if (gameOver || !revealed[r][c] || board[r][c] <= 0) return;
  let fc = 0;
  for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
    const nr = r+dr, nc = c+dc;
    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && flagged[nr][nc]) fc++;
  }
  if (fc === board[r][c]) {
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      const nr = r+dr, nc = c+dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !flagged[nr][nc] && !revealed[nr][nc]) {
        if (board[nr][nc] === -1) { handleClick(nr, nc); return; }
        reveal(nr, nc);
      }
    }
    if (checkWin()) {
      gameOver = true; clearInterval(timerId);
      document.getElementById('msg').innerHTML = '<span class="win">🎉 恭喜通关！</span>';
    }
    render();
  }
}

function render() {
  const el = document.getElementById('board');
  el.style.gridTemplateColumns = `repeat(${cols}, 36px)`;
  el.innerHTML = '';
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    if (revealed[r][c]) {
      cell.classList.add('revealed');
      if (board[r][c] === -1) cell.classList.add('mine');
      else if (board[r][c] > 0) { cell.classList.add('n' + board[r][c]); cell.textContent = board[r][c]; }
    } else {
      cell.classList.add('hidden');
      if (flagged[r][c]) cell.classList.add('flagged');
    }
    cell.addEventListener('click', () => handleClick(r, c));
    cell.addEventListener('contextmenu', e => handleRightClick(e, r, c));
    cell.addEventListener('dblclick', () => handleDblClick(r, c));
    el.appendChild(cell);
  }
}

function highlightHit(r, c) {
  const idx = r * cols + c;
  const cells = document.getElementById('board').children;
  if (cells[idx]) cells[idx].classList.add('mine-hit');
}

newGame();
</script>
</body>
</html>
